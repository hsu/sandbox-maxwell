<?php
session_start();

// Define your username and password for demonstration
define('USERNAME', 'admin');
define('PASSWORD', 'password');

$login_error = '';

if ($_SERVER["REQUEST_METHOD"] == "POST") {
    $username = $_POST['username'];
    $password = $_POST['password'];

    // Simple authentication check
    if ($username === USERNAME && $password === PASSWORD) {
        $_SESSION['logged_in'] = true; // Start the session on successful login
        header("Location: /spaceship"); // Redirect to the spaceship game proxy route
        exit;
    } else {
        $login_error = 'Login failed: Invalid username or password.';
        // Optionally log failed attempts here
    }
}
