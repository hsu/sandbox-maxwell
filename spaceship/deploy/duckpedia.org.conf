<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	ServerName duckpedia.org
	ServerAlias duckpedia.org
	DocumentRoot /var/www/duckpedia.org/public_html

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	RewriteEngine on
	RewriteCond %{SERVER_NAME} =duckpedia.org
	RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
