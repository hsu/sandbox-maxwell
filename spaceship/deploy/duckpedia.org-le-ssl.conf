<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerAdmin webmaster@localhost
	ServerName duckpedia.org
	ServerAlias duckpedia.org
	DocumentRoot /var/www/duckpedia.org/public_html

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# ----------------------------------------------------
	# SPACESHIP GAME REVERSE PROXY RULES
	# ----------------------------------------------------

	# Allow WebSocket Upgrade for Socket.IO
	RewriteEngine On
	RewriteCond %{HTTP:Upgrade} websocket [NC]
	RewriteCond %{HTTP:Connection} upgrade [NC]
	RewriteRule ^/spaceship/(.*) ws://localhost:5000/spaceship/$1 [P,L]

	# Proxy normal HTTP traffic
	ProxyPass /spaceship http://localhost:5000/spaceship
	ProxyPassReverse /spaceship http://localhost:5000/spaceship
	# ----------------------------------------------------

  SSLCertificateFile /etc/letsencrypt/live/maxwellhsu.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/maxwellhsu.com/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
